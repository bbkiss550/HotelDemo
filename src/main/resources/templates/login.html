<!doctype html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - BlueCatHotelDemo</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/mazer/dist/assets/css/bootstrap.css}">
    <link rel="stylesheet" th:href="@{/mazer/dist/assets/vendors/bootstrap-icons/bootstrap-icons.css}">
    <link rel="stylesheet" th:href="@{/mazer/dist/assets/css/app.css}">
    <link rel="stylesheet" th:href="@{/mazer/dist/assets/css/pages/auth.css}">
</head>
<body>
<div id="auth">
    <div class="row h-100">
        <div class="col-lg-5 col-12">
            <div id="auth-left">
                <div class="mb-5">
                    <div class="d-inline-flex align-items-center gap-3">
                        <img class="auth-brand-logo" th:src="@{/mazer/dist/assets/images/logo/logo-web.png}" alt="BlueCatHotelDemo logo">
                        <h4 class="mb-0">BlueCatHotelDemo</h4>
                    </div>
                </div>
                <h1 class="auth-title">เข้าสู่ระบบ</h1>
                <p class="auth-subtitle mb-5">ระบบจัดการห้องพัก ผู้เข้าพัก และการชำระเงิน</p>
                <form method="post" th:action="@{/login}">
                    <div class="form-group position-relative has-icon-left mb-4">
                        <input class="form-control form-control-xl" name="username" placeholder="ผู้ใช้งาน" autofocus>
                        <div class="form-control-icon"><i class="bi bi-person"></i></div>
                    </div>
                    <div class="form-group position-relative has-icon-left mb-4">
                        <input class="form-control form-control-xl" name="password" type="password" placeholder="รหัสผ่าน">
                        <div class="form-control-icon"><i class="bi bi-shield-lock"></i></div>
                    </div>
                    <button class="btn btn-primary btn-block btn-lg shadow-lg mt-4" type="submit">เข้าสู่ระบบ</button>
                </form>
            </div>
        </div>
        <div class="col-lg-7 d-none d-lg-block">
            <div id="auth-right"></div>
        </div>
    </div>
</div>
</body>
</html>
