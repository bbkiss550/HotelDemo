<div th:fragment="nav">
    <div id="sidebar" class="active">
        <div class="sidebar-wrapper active">
            <div class="sidebar-header">
                <div class="d-flex justify-content-between">
                    <a class="brand-mark text-decoration-none" th:href="@{/}">
                        <img th:src="@{/mazer/dist/assets/images/logo/logo-web.png}" alt="BlueCatHotelDemo logo">
                        <span>BlueCatHotelDemo</span>
                    </a>
                    <div class="toggler">
                        <a href="#" class="sidebar-hide d-xl-none d-block"><i class="bi bi-x bi-middle"></i></a>
                    </div>
                </div>
            </div>
            <div class="sidebar-menu">
                <ul class="menu">
                    <li class="sidebar-title">Menu</li>
                    <li class="sidebar-item" th:each="menu : ${sidebarMenus}">
                        <a class="sidebar-link" th:href="${menu.link}">
                            <i class="bi" th:classappend="${menu.icon}"></i>
                            <span th:text="${menu.name}"></span>
                        </a>
                    </li>
                </ul>
            </div>
            <button class="sidebar-toggler btn x"><i data-feather="x"></i></button>
        </div>
    </div>
    <div class="app-topbar">
        <div>
            <h1 class="topbar-title">BlueCatHotelDemo</h1>
            <p class="topbar-subtitle">Hotel management workspace</p>
        </div>
        <div class="topbar-actions">
            <span class="topbar-user">
                <i class="bi bi-person-circle"></i>
                <span sec:authentication="name">admin</span>
            </span>
            <form method="post" th:action="@{/logout}" class="mb-0">
                <button class="btn btn-outline-danger" type="submit">
                    <i class="bi bi-box-arrow-right me-1"></i>Logout
                </button>
            </form>
        </div>
    </div>
</div>

<div th:fragment="scripts">
    <script th:src="@{/mazer/dist/assets/vendors/perfect-scrollbar/perfect-scrollbar.min.js}"></script>
    <script th:src="@{/mazer/dist/assets/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/mazer/dist/assets/js/main.js}"></script>
    <script>
        document.querySelectorAll('.sidebar-link').forEach(function (link) {
            if (link.pathname === window.location.pathname ||
                (link.pathname !== '/' && window.location.pathname.startsWith(link.pathname))) {
                link.closest('.sidebar-item')?.classList.add('active');
            }
        });
    </script>
</div>
