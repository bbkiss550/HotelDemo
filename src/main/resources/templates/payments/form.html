<!doctype html>
<html lang="th">
<head th:replace="~{fragments/head :: head('บันทึกการชำระเงิน')}"></head>
<body>
<div id="app">
    <div th:replace="~{fragments/nav :: nav}"></div>
    <div id="main">
        <header class="mb-3"><a href="#" class="burger-btn d-block d-xl-none"><i class="bi bi-justify fs-3"></i></a></header>
        <div class="page-heading"><h3>บันทึกการชำระเงิน</h3></div>
        <div class="page-content">
            <section class="section">
                <div class="card"><div class="card-body">
                    <form method="post" th:action="@{/payments}" th:object="${payment}">
                        <input type="hidden" th:field="*{id}">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">ผู้พัก</label>
                                <select class="form-select" name="guestId">
                                    <option value="">ไม่ระบุ</option>
                                    <option th:each="g : ${guests}" th:value="${g.id}" th:text="|${g.fullName} / ห้อง ${g.room.roomNumber}|" th:selected="${payment.guest != null and payment.guest.id == g.id}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">ห้อง</label>
                                <select class="form-select" name="roomId" required>
                                    <option th:each="r : ${rooms}" th:value="${r.id}" th:text="${r.roomNumber}" th:selected="${payment.room != null and payment.room.id == r.id}"></option>
                                </select>
                            </div>
                            <div class="col-md-4"><label class="form-label">ยอดชำระ</label><input class="form-control" type="number" step="0.01" th:field="*{amount}"></div>
                            <div class="col-md-4"><label class="form-label">วันที่ชำระ</label><input class="form-control" type="date" th:field="*{paymentDate}"></div>
                            <div class="col-md-4"><label class="form-label">สถานะ</label><select class="form-select" th:field="*{status}"><option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}"></option></select></div>
                            <div class="col-md-6"><label class="form-label">ประเภทเงิน</label><input class="form-control" th:field="*{paymentType}"></div>
                            <div class="col-md-6"><label class="form-label">วิธีชำระ</label><input class="form-control" th:field="*{paymentMethod}"></div>
                            <div class="col-12"><label class="form-label">หมายเหตุ</label><textarea class="form-control" rows="3" th:field="*{remark}"></textarea></div>
                        </div>
                        <div class="d-flex gap-2 mt-4">
                            <button class="btn btn-primary" type="submit"><i class="bi bi-save me-1"></i>บันทึก</button>
                            <a class="btn btn-light-secondary" th:href="@{/payments}">ยกเลิก</a>
                        </div>
                    </form>
                </div></div>
            </section>
        </div>
    </div>
</div>
<div th:replace="~{fragments/nav :: scripts}"></div>
</body>
</html>
