<!doctype html>
<html lang="th">
<head th:replace="~{fragments/head :: head('ข้อมูลสถานะห้องพัก')}"></head>
<body>
<div id="app">
    <div th:replace="~{fragments/nav :: nav}"></div>
    <div id="main">
        <header class="mb-3"><a href="#" class="burger-btn d-block d-xl-none"><i class="bi bi-justify fs-3"></i></a></header>
        <div class="page-heading">
            <h3>ข้อมูลสถานะห้องพัก</h3>
            <p class="text-subtitle text-muted mb-0">เลือกห้องว่างเพื่อบันทึกเข้าพัก หรือเปิดห้องที่มีผู้พักเพื่อชำระเงิน/เช็กเอาต์</p>
        </div>
        <div class="page-content">
            <section class="section">
                <div class="floor-toolbar mb-3">
                    <div class="floor-tabs">
                        <a th:each="floor : ${floors}" th:href="@{/guests(floorId=${floor.id}, q=${q})}" th:classappend="${selectedFloor != null and selectedFloor.id == floor.id} ? 'active' : ''" class="floor-tab">
                            <i class="bi bi-building"></i><span th:text="${floor.name}"></span>
                        </a>
                    </div>
                    <form class="floor-search" th:if="${selectedFloor != null}">
                        <input type="hidden" name="floorId" th:value="${selectedFloor.id}">
                        <div class="input-group"><span class="input-group-text"><i class="bi bi-search"></i></span><input class="form-control" name="q" placeholder="ค้นหาเลขห้อง" th:value="${q}"></div>
                    </form>
                </div>

                <div class="room-grid" th:if="${selectedFloor != null}">
                    <button class="room-tile guest-room-tile"
                            th:each="room : ${rooms}"
                            th:attr="data-bs-target=${'#guestRoomModal' + room.id}"
                            data-bs-toggle="modal"
                            type="button"
                            th:classappend="${room.status.name() == 'AVAILABLE'} ? ' status-available' : (${room.status.name() == 'MONTHLY_OCCUPIED'} ? ' status-monthly' : (${room.status.name() == 'DAILY_OCCUPIED'} ? ' status-daily' : (${room.status.name() == 'RESERVED'} ? ' status-reserved' : ' status-maintenance')))">
                        <span class="room-number" th:text="${room.roomNumber}"></span>
                        <span class="room-type" th:text="${room.roomType != null ? room.roomType.name : room.legacyRoomType}"></span>
                        <span class="room-status" th:text="${room.status.label}"></span>
                    </button>
                </div>
            </section>
        </div>

        <div class="modal fade" th:each="room : ${rooms}" th:id="${'guestRoomModal' + room.id}" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div th:if="${room.status.name() == 'AVAILABLE'}">
                        <form class="guest-stay-form" method="post" th:action="@{/guests}">
                            <input type="hidden" name="roomId" th:value="${room.id}">
                            <input type="hidden" name="floorId" th:value="${selectedFloor.id}">
                            <div class="modal-header"><h5 class="modal-title">บันทึกเข้าพัก ห้อง <span th:text="${room.roomNumber}"></span></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                            <div class="modal-body row g-3">
                                <div class="col-md-6"><label class="form-label">ชื่อผู้พัก</label><input class="form-control" name="fullName" required></div>
                                <div class="col-md-6"><label class="form-label">เบอร์โทร</label><input class="form-control" name="phone"></div>
                                <div class="col-md-6"><label class="form-label">เลขบัตรประชาชน</label><input class="form-control" name="idCard"></div>
                                <div class="col-md-6"><label class="form-label">วันที่เข้า</label><input class="form-control" type="date" name="checkInDate"></div>
                                <div class="col-md-6"><label class="form-label">วันที่ออก</label><input class="form-control" type="date" name="checkOutDate"></div>
                                <div class="col-md-6"><label class="form-label">ที่อยู่</label><input class="form-control" name="address"></div>
                                <div class="col-12">
                                    <label class="form-label d-block">รูปแบบการพัก</label>
                                    <div class="form-check form-check-inline"><input class="form-check-input stay-type-radio" type="radio" name="stayType" value="DAILY" checked th:attr="data-daily-price=${room.roomType != null ? room.roomType.nightlyPrice : room.nightlyPrice},data-monthly-price=${room.roomType != null ? room.roomType.monthlyPrice : room.monthlyPrice}"><label class="form-check-label">รายวัน</label></div>
                                    <div class="form-check form-check-inline"><input class="form-check-input stay-type-radio" type="radio" name="stayType" value="MONTHLY" th:attr="data-daily-price=${room.roomType != null ? room.roomType.nightlyPrice : room.nightlyPrice},data-monthly-price=${room.roomType != null ? room.roomType.monthlyPrice : room.monthlyPrice}"><label class="form-check-label">รายเดือน</label></div>
                                </div>
                                <div class="col-md-4 monthly-fields d-none"><label class="form-label">จ่ายล่วงหน้า</label><select class="form-select advance-months" name="advanceMonths"><option th:each="month : ${#numbers.sequence(1,12)}" th:value="${month}" th:text="${month + ' เดือน'}"></option></select></div>
                                <div class="col-md-4 monthly-fields d-none"><label class="form-label">ค่าประกัน</label><input class="form-control deposit-field" type="number" step="0.01" name="deposit" value="0"></div>
                                <div class="col-md-4"><label class="form-label price-label">ราคาต่อวัน</label><input class="form-control price-field" type="number" step="0.01" name="price" th:value="${room.roomType != null ? room.roomType.nightlyPrice : room.nightlyPrice}"></div>
                                <div class="col-md-6"><label class="form-label">รวมจ่ายแรกเข้า</label><input class="form-control initial-payment-field" type="number" step="0.01" name="initialPayment" readonly></div>
                                <div class="col-12"><label class="form-label">หมายเหตุ</label><textarea class="form-control" rows="3" name="note"></textarea></div>
                            </div>
                            <div class="modal-footer"><button type="button" class="btn btn-light-secondary" data-bs-dismiss="modal">ยกเลิก</button><button class="btn btn-primary" type="submit">บันทึกเข้าพัก</button></div>
                        </form>
                    </div>
                    <div th:unless="${room.status.name() == 'AVAILABLE'}" th:with="guest=${activeGuests[room.id]}">
                        <div class="modal-header"><h5 class="modal-title">ห้อง <span th:text="${room.roomNumber}"></span></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                        <div class="modal-body" th:if="${guest != null}">
                            <div class="row g-3">
                                <div class="col-md-6"><strong>ผู้พัก</strong><div th:text="${guest.fullName}"></div></div>
                                <div class="col-md-6"><strong>เบอร์โทร</strong><div th:text="${guest.phone}"></div></div>
                                <div class="col-md-4"><strong>ประเภท</strong><div th:text="${guest.stayType.label}"></div></div>
                                <div class="col-md-4"><strong>วันเข้า</strong><div th:text="${@thaiDate.format(guest.checkInDate)}"></div></div>
                                <div class="col-md-4"><strong>ยอดแรกเข้า</strong><div th:text="${#numbers.formatDecimal(guest.initialPayment, 1, 'COMMA', 2, 'POINT')}"></div></div>
                            </div>
                        </div>
                        <div class="modal-body" th:if="${guest == null}">ไม่มีข้อมูลผู้พักที่ยัง active สำหรับห้องนี้</div>
                        <div class="modal-footer justify-content-between">
                            <form th:if="${guest != null}" method="post" th:action="@{/guests/{id}/checkout(id=${guest.id})}">
                                <input type="hidden" name="floorId" th:value="${selectedFloor.id}">
                                <button class="btn btn-danger" type="submit" onclick="return confirm('ยืนยันเช็กเอาต์?')"><i class="bi bi-box-arrow-right me-1"></i>เช็กเอาต์</button>
                            </form>
                            <div class="ms-auto d-flex gap-2">
                                <a th:if="${guest != null}" class="btn btn-light-primary" th:href="@{/guests/{id}(id=${guest.id})}">รายละเอียด</a>
                                <a th:if="${guest != null}" class="btn btn-primary" th:href="@{/payments/new(guestId=${guest.id})}">รับชำระ</a>
                                <button type="button" class="btn btn-light-secondary" data-bs-dismiss="modal">ปิด</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/nav :: scripts}"></div>
<script>
document.querySelectorAll('.guest-stay-form').forEach((form) => {
    const priceField = form.querySelector('.price-field');
    const priceLabel = form.querySelector('.price-label');
    const depositField = form.querySelector('.deposit-field');
    const initialPaymentField = form.querySelector('.initial-payment-field');
    const monthlyFields = form.querySelectorAll('.monthly-fields');
    const advanceMonths = form.querySelector('.advance-months');
    const updatePrice = (resetBasePrice = false) => {
        const selected = form.querySelector('.stay-type-radio:checked');
        const isMonthly = selected.value === 'MONTHLY';
        monthlyFields.forEach((field) => field.classList.toggle('d-none', !isMonthly));
        const base = Number(isMonthly ? selected.dataset.monthlyPrice || 0 : selected.dataset.dailyPrice || 0);
        const months = Number(advanceMonths?.value || 1);
        const deposit = Number(depositField?.value || 0);
        priceLabel.textContent = isMonthly ? 'ราคาต่อเดือน' : 'ราคาต่อวัน';
        if (resetBasePrice || !priceField.dataset.customized) priceField.value = base.toFixed(2);
        initialPaymentField.value = isMonthly ? ((Number(priceField.value || 0) * months) + deposit).toFixed(2) : Number(priceField.value || 0).toFixed(2);
    };
    form.querySelectorAll('.stay-type-radio').forEach((radio) => radio.addEventListener('change', () => updatePrice(true)));
    advanceMonths?.addEventListener('change', updatePrice);
    depositField?.addEventListener('input', updatePrice);
    priceField?.addEventListener('input', () => { priceField.dataset.customized = 'true'; updatePrice(); });
    updatePrice(true);
});
</script>
</body>
</html>
