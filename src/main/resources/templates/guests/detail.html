<!doctype html>
<html lang="th">
<head th:replace="~{fragments/head :: head('รายละเอียดผู้พัก')}"></head>
<body>
<div id="app">
    <div th:replace="~{fragments/nav :: nav}"></div>
    <div id="main">
        <header class="mb-3"><a href="#" class="burger-btn d-block d-xl-none"><i class="bi bi-justify fs-3"></i></a></header>
        <div class="page-heading d-flex justify-content-between align-items-center">
            <div><h3 th:text="${guest.fullName}">ผู้พัก</h3><p class="text-subtitle text-muted mb-0" th:text="|ห้อง ${guest.room.roomNumber}|"></p></div>
            <a class="btn btn-primary" th:href="@{/payments/new(guestId=${guest.id})}"><i class="bi bi-credit-card me-1"></i>รับชำระ</a>
        </div>
        <div class="page-content">
            <section class="row g-3">
                <div class="col-lg-5"><div class="card"><div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-5">เบอร์โทร</dt><dd class="col-7" th:text="${guest.phone}"></dd>
                        <dt class="col-5">เลขบัตร</dt><dd class="col-7" th:text="${guest.idCard}"></dd>
                        <dt class="col-5">ประเภท</dt><dd class="col-7" th:text="${guest.stayType.label}"></dd>
                        <dt class="col-5">วันเข้า</dt><dd class="col-7" th:text="${@thaiDate.format(guest.checkInDate)}"></dd>
                        <dt class="col-5">วันออก</dt><dd class="col-7" th:text="${@thaiDate.format(guest.checkOutDate)}"></dd>
                        <dt class="col-5">ยอดแรกเข้า</dt><dd class="col-7" th:text="${#numbers.formatDecimal(guest.initialPayment, 1, 'COMMA', 2, 'POINT')}"></dd>
                        <dt class="col-5">จ่ายแล้ว</dt><dd class="col-7" th:text="${#numbers.formatDecimal(guest.totalPaid, 1, 'COMMA', 2, 'POINT')}"></dd>
                    </dl>
                </div></div></div>
                <div class="col-lg-7"><div class="card"><div class="card-body">
                    <h5>ประวัติชำระเงิน</h5>
                    <div class="table-responsive"><table class="table mb-0"><thead><tr><th>วันที่</th><th>ประเภท</th><th>ยอด</th><th>สถานะ</th></tr></thead><tbody><tr th:each="p : ${payments}"><td th:text="${@thaiDate.format(p.paymentDate)}"></td><td th:text="${p.paymentType}"></td><td th:text="${#numbers.formatDecimal(p.amount, 1, 'COMMA', 2, 'POINT')}"></td><td th:text="${p.status.label}"></td></tr></tbody></table></div>
                </div></div></div>
            </section>
        </div>
    </div>
</div>
<div th:replace="~{fragments/nav :: scripts}"></div>
</body>
</html>
