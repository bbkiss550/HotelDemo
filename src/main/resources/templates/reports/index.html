<!doctype html>
<html lang="th">
<head th:replace="~{fragments/head :: head('รายงาน')}"></head>
<body>
<div id="app">
    <div th:replace="~{fragments/nav :: nav}"></div>
    <div id="main">
        <header class="mb-3"><a href="#" class="burger-btn d-block d-xl-none"><i class="bi bi-justify fs-3"></i></a></header>
        <div class="page-heading d-flex justify-content-between align-items-center">
            <div><h3>รายงาน</h3><p class="text-subtitle text-muted mb-0">สรุปรายได้ สถานะห้อง และรายการใช้งานจริง</p></div>
            <a class="btn btn-light-primary" th:href="@{/reports/payments.csv}"><i class="bi bi-filetype-csv me-1"></i>Export CSV</a>
        </div>
        <div class="page-content"><section class="row g-3">
            <div class="col-md-3"><div class="card"><div class="card-body"><h6 class="text-muted">ห้องทั้งหมด</h6><h3 th:text="${totalRooms}">0</h3></div></div></div>
            <div class="col-md-3"><div class="card"><div class="card-body"><h6 class="text-muted">ห้องว่าง</h6><h3 th:text="${availableRooms}">0</h3></div></div></div>
            <div class="col-md-3"><div class="card"><div class="card-body"><h6 class="text-muted">มีผู้พัก</h6><h3 th:text="${occupiedRooms}">0</h3></div></div></div>
            <div class="col-md-3"><div class="card"><div class="card-body"><h6 class="text-muted">ค้างชำระ</h6><h3 th:text="${unpaidPayments}">0</h3></div></div></div>
            <div class="col-md-6"><div class="card"><div class="card-body"><h6 class="text-muted">รายได้วันนี้</h6><h2 th:text="${#numbers.formatDecimal(todayRevenue, 1, 'COMMA', 2, 'POINT')}">0.00</h2></div></div></div>
            <div class="col-md-6"><div class="card"><div class="card-body"><h6 class="text-muted">รายได้เดือนนี้</h6><h2 th:text="${#numbers.formatDecimal(monthRevenue, 1, 'COMMA', 2, 'POINT')}">0.00</h2></div></div></div>
            <div class="col-lg-6"><div class="card"><div class="card-body"><h5>ผู้พักปัจจุบัน</h5><div class="table-responsive"><table class="table mb-0"><thead><tr><th>ห้อง</th><th>ผู้พัก</th><th>ประเภท</th><th>ยอดแรกเข้า</th></tr></thead><tbody><tr th:each="g : ${activeGuests}"><td th:text="${g.room.roomNumber}"></td><td th:text="${g.fullName}"></td><td th:text="${g.stayType.label}"></td><td th:text="${#numbers.formatDecimal(g.initialPayment, 1, 'COMMA', 2, 'POINT')}"></td></tr></tbody></table></div></div></div></div>
            <div class="col-lg-6"><div class="card"><div class="card-body"><h5>การจอง</h5><div class="table-responsive"><table class="table mb-0"><thead><tr><th>วันเข้า</th><th>ประเภทห้อง</th><th>ลูกค้า</th><th>สถานะ</th></tr></thead><tbody><tr th:each="b : ${bookings}"><td th:text="${@thaiDate.format(b.checkInDate)}"></td><td th:text="${b.roomType != null ? b.roomType.name : (b.room != null and b.room.roomType != null ? b.room.roomType.name : '-')}"></td><td th:text="${b.customerName}"></td><td th:text="${b.status.label}"></td></tr></tbody></table></div></div></div></div>
        </section></div>
    </div>
</div>
<div th:replace="~{fragments/nav :: scripts}"></div>
</body>
</html>
