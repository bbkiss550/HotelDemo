<!doctype html>
<html lang="th">
<head th:replace="~{fragments/head :: head('บันทึกผู้ใช้งาน')}"></head>
<body>
<div id="app">
    <div th:replace="~{fragments/nav :: nav}"></div>
    <div id="main">
        <header class="mb-3">
            <a href="#" class="burger-btn d-block d-xl-none"><i class="bi bi-justify fs-3"></i></a>
        </header>
        <div class="page-heading">
            <h3>บันทึกผู้ใช้งาน</h3>
        </div>
        <div class="page-content">
            <section class="section">
                <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
                <div class="card">
                    <div class="card-body">
                        <form method="post" th:action="@{/users}" th:object="${user}">
                            <input type="hidden" th:field="*{id}">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Username</label>
                                    <input class="form-control" th:field="*{username}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Password</label>
                                    <input class="form-control" type="password" th:field="*{password}" th:placeholder="${user.id == null ? 'กรอกรหัสผ่าน' : 'ปล่อยว่างไว้ถ้าไม่เปลี่ยนรหัส'}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">ชื่อ</label>
                                    <input class="form-control" th:field="*{fullName}">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">เพศ</label>
                                    <select class="form-select" name="genderId">
                                        <option value="">เลือกเพศ</option>
                                        <option th:each="g : ${genders}" th:value="${g.id}" th:text="${g.name}" th:selected="${user.gender != null && user.gender.id == g.id}"></option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">วันเกิด</label>
                                    <input class="form-control" type="date" th:field="*{birthDate}">
                                </div>
                            </div>
                            <div class="d-flex gap-2 mt-4">
                                <button class="btn btn-primary" type="submit"><i class="bi bi-save me-1"></i>บันทึก</button>
                                <a class="btn btn-light-secondary" th:href="@{/users}">ยกเลิก</a>
                            </div>
                        </form>
                    </div>
                </div>
            </section>
        </div>
    </div>
</div>
<div th:replace="~{fragments/nav :: scripts}"></div>
</body>
</html>
