<!doctype html>
<html lang="th">
<head th:replace="~{fragments/head :: head('Dashboard')}"></head>
<body>
<div id="app">
    <div th:replace="~{fragments/nav :: nav}"></div>
    <div id="main">
        <header class="mb-3">
            <a href="#" class="burger-btn d-block d-xl-none">
                <i class="bi bi-justify fs-3"></i>
            </a>
        </header>
        <div class="page-heading">
            <h3>Dashboard</h3>
        </div>
        <div class="page-content">
            <section class="row">
                <div class="col-12">
                    <div class="row">
                        <div class="col-12 col-sm-6 col-lg-4 col-xl">
                            <div class="card stat-card">
                                <div class="card-body px-3 py-4">
                                    <div class="row">
                                        <div class="col-auto">
                                            <div class="stats-icon blue"><i class="bi bi-door-open"></i></div>
                                        </div>
                                        <div class="col">
                                            <h6 class="text-muted font-semibold">ห้องทั้งหมด</h6>
                                            <h6 class="font-extrabold mb-0" th:text="${totalRooms}">0</h6>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6 col-lg-4 col-xl">
                            <div class="card stat-card">
                                <div class="card-body px-3 py-4">
                                    <div class="row">
                                        <div class="col-auto">
                                            <div class="stats-icon green"><i class="bi bi-check2-circle"></i></div>
                                        </div>
                                        <div class="col">
                                            <h6 class="text-muted font-semibold">ห้องว่าง</h6>
                                            <h6 class="font-extrabold mb-0" th:text="${availableRooms}">0</h6>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6 col-lg-4 col-xl">
                            <div class="card stat-card">
                                <div class="card-body px-3 py-4">
                                    <div class="row">
                                        <div class="col-auto">
                                            <div class="stats-icon purple"><i class="bi bi-person-check"></i></div>
                                        </div>
                                        <div class="col">
                                            <h6 class="text-muted font-semibold">มีผู้พัก</h6>
                                            <h6 class="font-extrabold mb-0" th:text="${occupiedRooms}">0</h6>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6 col-lg-4 col-xl">
                            <div class="card stat-card">
                                <div class="card-body px-3 py-4">
                                    <div class="row">
                                        <div class="col-auto">
                                            <div class="stats-icon red"><i class="bi bi-calendar-check"></i></div>
                                        </div>
                                        <div class="col">
                                            <h6 class="text-muted font-semibold">จองแล้ว</h6>
                                            <h6 class="font-extrabold mb-0" th:text="${reservedRooms}">0</h6>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6 col-lg-4 col-xl">
                            <div class="card stat-card">
                                <div class="card-body px-3 py-4">
                                    <div class="row">
                                        <div class="col-auto">
                                            <div class="stats-icon blue"><i class="bi bi-receipt"></i></div>
                                        </div>
                                        <div class="col">
                                            <h6 class="text-muted font-semibold">ค้างชำระ</h6>
                                            <h6 class="font-extrabold mb-0" th:text="${unpaidRooms}">0</h6>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>
</div>
<div th:replace="~{fragments/nav :: scripts}"></div>
</body>
</html>
